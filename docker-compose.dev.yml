services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: inventory-server-dev
    container_name: inventory-api
    command: npm run dev
    ports:
      - '${PORT:-5000}:5000'
    volumes:
      - ./secrets:/app/secrets:ro
    env_file:
      - .env
    environment:
      PORT: 5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/secrets/inventory-firebase-adminsdk.json
    depends_on:
      - redis
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .git/
            - docker-compose.yml
            - Dockerfile
            - README.md
            - .gitignore
            - docker-compose.dev.yml
            - Dockerfile.dev
            - .dockerignore
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: inventory-server-dev
    container_name: inventory-worker
    command: npm run dev:worker
    volumes:
      - ./secrets:/app/secrets:ro
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/secrets/inventory-firebase-adminsdk.json
    depends_on:
      - redis
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .git/
            - docker-compose.yml
            - Dockerfile
            - README.md
            - .gitignore
            - docker-compose.dev.yml
            - Dockerfile.dev
            - .dockerignore
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
